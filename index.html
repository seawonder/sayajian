<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사야에게</title>

<style>

body{
margin:0;
height:100vh;
background:#0f172a;
color:white;
font-family:sans-serif;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
overflow:hidden;
}

/* 제목 */

.title{
position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
font-size:26px;
z-index:5;
}

/* 버튼 */

.container{
position:absolute;
top:90px;
z-index:5;
}

button{
padding:12px 20px;
font-size:16px;
border:none;
border-radius:6px;
background:white;
cursor:pointer;
}

/* 지안 우산 */

.umbrella{
position:absolute;
top:38%;
left:50%;
transform:translateX(-50%);
font-size:28px;
line-height:1.5;
opacity:0;
transition:0.6s;
z-index:3;
white-space:pre;
font-family:monospace;
}

/* 사야 */

.saya{
position:absolute;
top:58%;
left:50%;
transform:translateX(-50%);
font-size:24px;
opacity:0;
transition:0.6s;
z-index:3;
}

/* 메시지 */

.message{
position:absolute;
bottom:120px;
left:50%;
transform:translateX(-50%);
font-size:20px;
line-height:1.6;
opacity:0;
transition:0.8s;
z-index:3;
}

/* 비 */

.rain{
position:absolute;
width:2px;
height:15px;
background:white;
opacity:0.6;
}

/* 모바일 */

@media(max-width:500px){

.umbrella{
font-size:18px;
}

.saya{
font-size:18px;
}

.message{
font-size:16px;
}

}

</style>
</head>

<body>

<h1 class="title">사야에게</h1>

<div class="container">
<button id="startBtn" onclick="start()">눌러봐! ☔</button>
</div>

<div class="umbrella" id="umbrella">
지안지안지안지안지안
지안        지안
지안        지안
지안        지안
지안        지안
</div>

<div class="saya" id="saya">
사야
</div>

<div class="message" id="msg">
내가 돈 열심히 벌어서<br>
비 맞지 않게 해줄게 ☂️<br>
보고 싶어! 사랑해!
</div>

<script>

let drops=[]
let umbrellaActive=false

function createRain(){

for(let i=0;i<150;i++){

let el=document.createElement("div")
el.className="rain"
document.body.appendChild(el)

drops.push({
el:el,
x:Math.random()*window.innerWidth,
y:Math.random()*window.innerHeight,
vy:4+Math.random()*3,
vx:0
})

}

}

function start(){

document.getElementById("startBtn").style.display="none"

umbrellaActive=true

document.getElementById("umbrella").style.opacity=1
document.getElementById("saya").style.opacity=1

setTimeout(()=>{
document.getElementById("msg").style.opacity=1
},800)

}

function updateRain(){

let umbrella=document.getElementById("umbrella")
let rect=umbrella.getBoundingClientRect()

drops.forEach(d=>{

d.y+=d.vy
d.x+=d.vx

if(umbrellaActive){

if(
d.x>rect.left &&
d.x<rect.right &&
d.y>rect.top &&
d.y<rect.bottom
){

/* 우산 맞음 */

d.y=rect.top

/* 튕김 */

d.vx=(Math.random()-0.5)*8
d.vy=2

}

}

if(d.y>window.innerHeight){

d.y=-20
d.x=Math.random()*window.innerWidth
d.vx=0
d.vy=4+Math.random()*3

}

d.el.style.transform=`translate(${d.x}px,${d.y}px)`

})

requestAnimationFrame(updateRain)

}

createRain()
updateRain()

</script>

</body>
</html>
